<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>孟孟的时光藏宝铺</title>
<style>
:root {
  --main-pink: #ffb2c6;
  --light-pink: #ffebf2;
  --dark-pink: #c24472;
  --r-color: #7097e0;
  --sr-color: #83c768;
  --ssr-color: #e8b448;
  --pr-color: #d874d0;
  --gift-color: #f06c6c;
  --white: #ffffff;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
  font-size: 14px;
}
body {
  background: var(--light-pink);
  padding: 12px;
  min-height: 100vh;
}
/* 顶部标题横幅 */
.site-title {
  text-align: center;
  padding: 16px 12px;
  background: linear-gradient(120deg, var(--main-pink), #ffd0dd);
  border-radius: 14px;
  margin-bottom: 16px;
}
.site-title h1 {
  font-size: 22px;
  color: var(--dark-pink);
  letter-spacing: 1px;
}
/* Tab导航切换栏 */
.tab-nav {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
}
.tab-btn {
  flex: 1;
  padding: 10px 0;
  border: none;
  border-radius: 10px;
  background: #fff;
  color: #777;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s ease;
}
.tab-btn.active {
  background: var(--main-pink);
  color: white;
}
/* Tab内容容器，默认隐藏非激活页面 */
.tab-content {
  display: none;
  background: var(--white);
  border-radius: 14px;
  padding: 16px;
}
.tab-content.show {
  display: block;
}
/* 板块小标题 */
.sub-title {
  font-size: 17px;
  color: var(--dark-pink);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--light-pink);
}
/* 统计卡片网格 */
.stat-wrap {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 10px;
}
.stat-card {
  background: var(--light-pink);
  padding: 14px 8px;
  border-radius: 10px;
  text-align: center;
}
.stat-card .num {
  display: block;
  font-size: 20px;
  font-weight: bold;
  color: var(--dark-pink);
  margin-top: 4px;
}
/* 抽卡录入区域 */
.draw-num-select {
  width: 100%;
  padding: 8px;
  border: 1px solid var(--main-pink);
  border-radius: 8px;
  margin: 8px 0 14px;
}
.draw-input-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 9px;
  margin-bottom: 16px;
}
.draw-input-grid select {
  width: 100%;
  padding: 7px;
  border: 1px solid #ddd;
  border-radius: 8px;
}
.save-btn {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: var(--main-pink);
  color: white;
  font-weight: bold;
  cursor: pointer;
}
/* 历史表格顶部操作栏 */
.table-top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.clear-all-btn {
  padding: 7px 12px;
  border: none;
  border-radius: 8px;
  background: #f06c6c;
  color: white;
  cursor: pointer;
}
.history-table {
  width: 100%;
  border-collapse: collapse;
}
.history-table th {
  background: var(--main-pink);
  color: white;
  padding: 9px 4px;
  font-size: 12px;
}
.history-table td {
  padding: 9px 4px;
  border-bottom: 1px solid #ffe3ed;
  font-size: 12px;
  text-align: center;
}
.history-table tr:nth-child(even) {
  background: var(--light-pink);
}
/* 稀有度彩色标签 */
.tag {
  padding: 2px 7px;
  border-radius: 12px;
  color: white;
  font-size: 11px;
}
.tag-R { background: var(--r-color); }
.tag-SR { background: var(--sr-color); }
.tag-SSR { background: var(--ssr-color); }
.tag-PR { background: var(--pr-color); }
.tag-Gift { background: var(--gift-color); }
.del-one {
  padding: 3px 7px;
  border: none;
  border-radius: 6px;
  background: #ffd0dd;
  color: var(--dark-pink);
  cursor: pointer;
  font-size: 11px;
}
</style>
</head>
<body>
<div class="site-title">
  <h1>🌸 孟孟的时光藏宝铺 🌸</h1>
</div>

<!-- 顶部Tab切换导航 -->
<div class="tab-nav">
  <button class="tab-btn active" data-tab="overview">数据总览</button>
  <button class="tab-btn" data-tab="draw">录入抽卡</button>
  <button class="tab-btn" data-tab="history">历史记录</button>
</div>

<!-- Tab1：数据总览统计 -->
<div class="tab-content show" id="overview">
  <h2 class="sub-title">全部抽卡数据汇总</h2>
  <div class="stat-wrap">
    <div class="stat-card">
      总抽取次数
      <span class="num" id="totalDraw">0</span>
    </div>
    <div class="stat-card">
      R卡牌
      <span class="num" id="rTotal">0</span>
    </div>
    <div class="stat-card">
      SR卡牌
      <span class="num" id="srTotal">0</span>
    </div>
    <div class="stat-card">
      SSR卡牌
      <span class="num" id="ssrTotal">0</span>
    </div>
    <div class="stat-card">
      PR特典卡
      <span class="num" id="prTotal">0</span>
    </div>
    <div class="stat-card">
      周边奖品
      <span class="num" id="giftTotal">0</span>
    </div>
  </div>
</div>

<!-- Tab2：录入本次抽卡 -->
<div class="tab-content" id="draw">
  <h2 class="sub-title">记录本次抽取卡牌</h2>
  <label>本次抽取数量（1~10抽）</label>
  <select class="draw-num-select" id="drawCount">
    <option value="1">1抽</option>
    <option value="2">2抽</option>
    <option value="3">3抽</option>
    <option value="4">4抽</option>
    <option value="5">5抽</option>
    <option value="6">6抽</option>
    <option value="7">7抽</option>
    <option value="8">8抽</option>
    <option value="9">9抽</option>
    <option value="10">10抽</option>
  </select>
  <div class="draw-input-grid" id="drawInputWrap"></div>
  <button class="save-btn" id="submitDraw">保存本次抽卡记录</button>
</div>

<!-- Tab3：全部历史流水 -->
<div class="tab-content" id="history">
  <div class="table-top-bar">
    <h2 class="sub-title">全部抽卡历史流水</h2>
    <button class="clear-all-btn" id="clearAll">清空所有记录</button>
  </div>
  <table class="history-table">
    <thead>
      <tr>
        <th>抽取时间</th>
        <th>稀有分类</th>
        <th>物品名称</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="historyList"></tbody>
  </table>
</div>

<script>
// 完整卡牌数据定义
const cardData = {
  R: [
    "R1-双面卡1", "R2-双面卡2", "R3-双面卡3", "R4 - 双面卡 4", "R5 - 猫猫卡 1", "R6 - 猫猫卡 2", "R7 - 猫猫卡 3", "R8 - 猫猫卡 4", "R9 - 美孟卡 1", "R10 - 美孟卡 2", "R11 - 美孟卡 3", "R12 - 美孟卡 4", "R13 - 美孟卡 5", "R14 - 拍立得 1", "R15 - 拍立得 2", "R16 - 拍立得 3", "R17 - 拍立得 4"
  ],
  SR: [
"SR1-sr 高级风工艺卡 1", "SR2-sr 高级风工艺卡 2", "SR3-sr 高级风工艺卡 3", "SR4-sr 高级风工艺卡 4", "SR5 - 花卡 1", "SR6 - 花卡 2", "SR7 - 花卡 3", "SR8 - 花卡 4", "SR9 - 手绘猫猫卡 1", "SR10 - 手绘猫猫卡 2", "SR11 - 手绘猫猫卡 3", "SR12 - 手绘猫猫卡 4", "SR13 - 综艺卡 1", "SR14 - 综艺卡 2", "SR15 - 综艺卡 3", "SR16 - 综艺卡 4", "SR17 - 综艺卡 5"
  ],
  SSR: [
"SSR1-ssr 工艺卡 1", "SSR2-ssr 工艺卡 2", "SSR3-ssr 工艺卡 3", "SSR4-ssr 工艺卡 4", "SSR5 - 嘟嘴卡 1", "SSR6 - 嘟嘴卡 2", "SSR7 - 嘟嘴卡 3", "SSR8 - 嘟嘴卡 4", "SSR9 - 嘟嘴卡 5", "SSR10 - 嘟嘴卡 6", "SSR11 - 古风卡 - 窦昭", "SSR12 - 古风卡 - 花琉璃", "SSR13 - 古风卡 - 青木媛", "SSR14 - 古风卡 - 沈妙", "SSR15 - 古风卡 - 暮晚摇", "SSR16 - 古风卡 - 沈汐和"
  ],
  PR: [
"PR1 - 语录卡 1", "PR2 - 语录卡 2", "PR3 - 语录卡 3", "PR4 - 语录卡 4", "PR5 - 自拍卡 1", "PR6 - 自拍卡 2", "PR7 - 自拍卡 3", "PR8 - 自拍卡 4", "PR9 - 古早卡 1", "PR10 - 古早卡 2", "PR11 - 古早卡 3", "PR12 - 古早卡 4"
  ],
  Gift: [
    "孟孟豆", "孟呦呦", "U型枕", "雅诗兰黛口红", "MM豆礼盒",
    "巧克力胸针", "保温杯", "999足金贴", "签名照"
  ]
};

// 独立本地存储标识，不和旧版/杨博文数据冲突
const STORAGE_TOTAL = "mengmeng_tab_new_total";
const STORAGE_HISTORY = "mengmeng_tab_new_history";

// 初始化本地存储数据
let totalStat = JSON.parse(localStorage.getItem(STORAGE_TOTAL)) || {
  totalDraw:0, R:0, SR:0, SSR:0, PR:0, Gift:0
};
let historyArr = JSON.parse(localStorage.getItem(STORAGE_HISTORY)) || [];

// Tab切换交互逻辑
const tabBtns = document.querySelectorAll(".tab-btn");
const tabContents = document.querySelectorAll(".tab-content");
tabBtns.forEach(btn => {
  btn.onclick = () => {
    const targetId = btn.dataset.tab;
    tabBtns.forEach(b => b.classList.remove("active"));
    tabContents.forEach(c => c.classList.remove("show"));
    btn.classList.add("active");
    document.getElementById(targetId).classList.add("show");
  }
});

// 页面DOM元素绑定
const drawCountSel = document.getElementById("drawCount");
const inputWrap = document.getElementById("drawInputWrap");
const submitBtn = document.getElementById("submitDraw");
const historyTbody = document.getElementById("historyList");
const clearAllBtn = document.getElementById("clearAll");

// 生成卡牌下拉选择框
function createSelect() {
  const sel = document.createElement("select");
  Object.keys(cardData).forEach(type => {
    cardData[type].forEach(name => {
      const opt = document.createElement("option");
      opt.value = JSON.stringify({type, name});
      opt.textContent = `[${type}] ${name}`;
      sel.appendChild(opt);
    })
  })
  return sel;
}

// 根据抽数刷新输入下拉框
function refreshDrawInput() {
  inputWrap.innerHTML = "";
  const num = Number(drawCountSel.value);
  for(let i=0; i<num; i++) inputWrap.appendChild(createSelect());
}

// 更新顶部统计数字
function refreshStat() {
  document.getElementById("totalDraw").innerText = totalStat.totalDraw;
  document.getElementById("rTotal").innerText = totalStat.R;
  document.getElementById("srTotal").innerText = totalStat.SR;
  document.getElementById("ssrTotal").innerText = totalStat.SSR;
  document.getElementById("prTotal").innerText = totalStat.PR;
  document.getElementById("giftTotal").innerText = totalStat.Gift;
}

// 渲染历史记录表格
function renderHistory() {
  historyTbody.innerHTML = "";
  historyArr.forEach((item, idx) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.time}</td>
      <td><span class="tag tag-${item.type}">${item.type}</span></td>
      <td>${item.name}</td>
      <td><button class="del-one" data-i="${idx}">删除</button></td>
    `;
    historyTbody.appendChild(tr);
  })
  // 单条删除事件绑定
  document.querySelectorAll(".del-one").forEach(b => {
    b.onclick = function(){
      const i = Number(this.dataset.i);
      const item = historyArr[i];
      totalStat[item.type] -= 1;
      totalStat.totalDraw -= 1;
      historyArr.splice(i, 1);
      saveData();
      refreshStat();
      renderHistory();
    }
  })
}

// 数据写入本地存储
function saveData() {
  localStorage.setItem(STORAGE_TOTAL, JSON.stringify(totalStat));
  localStorage.setItem(STORAGE_HISTORY, JSON.stringify(historyArr));
}

// 提交抽卡记录（移除保存成功alert弹窗）
submitBtn.onclick = function(){
  const selects = inputWrap.querySelectorAll("select");
  const now = new Date().toLocaleString();
  selects.forEach(sel => {
    const data = JSON.parse(sel.value);
    totalStat.totalDraw += 1;
    totalStat[data.type] += 1;
    historyArr.unshift({time:now, type:data.type, name:data.name});
  })
  saveData();
  refreshStat();
  renderHistory();
}

// 一键清空全部数据
clearAllBtn.onclick = function(){
  if(!confirm("确定清空全部抽卡数据，删除后无法恢复？")) return;
  totalStat = {totalDraw:0,R:0,SR:0,SSR:0,PR:0,Gift:0};
  historyArr = [];
  saveData();
  refreshStat();
  renderHistory();
}

// 切换抽数自动刷新输入框
drawCountSel.addEventListener("change", refreshDrawInput);

// 页面初始化加载
refreshDrawInput();
refreshStat();
renderHistory();
</script>
</body>
</html>
